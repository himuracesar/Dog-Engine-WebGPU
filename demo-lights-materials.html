<!DOCTYPE html>
<html lang="en">
<head>

    <title>Dog WebGPU - Demo Lighting & materials</title>

    <style>
        :root {

            --tp-base-shadow-color: hsla(0, 0%, 0%, 0.2);

            --tp-button-background-color-focus: hsla(0, 0%, 95%, 1);
            --tp-button-background-color-hover: hsla(0, 0%, 85%, 1);
            --tp-button-foreground-color: hsla(0, 0%, 0%, 0.8);
            --tp-container-background-color: hsla(0, 0%, 0%, 0.3);
            --tp-container-background-color-active: hsla(0, 0%, 0%, 0.6);
            --tp-container-background-color-focus: hsla(0, 0%, 0%, 0.5);
            --tp-container-background-color-hover: hsla(0, 0%, 0%, 0.4);
            --tp-container-foreground-color: hsla(0, 0%, 100%, 0.5);
            --tp-groove-foreground-color: hsla(0, 0%, 0%, 0.2);
            --tp-input-background-color: hsla(0, 0%, 0%, 0.3);
            --tp-input-background-color-active: hsla(0, 0%, 0%, 0.6);
            --tp-input-background-color-focus: hsla(0, 0%, 0%, 0.5);
            --tp-input-background-color-hover: hsla(0, 0%, 0%, 0.4);
            --tp-input-foreground-color: hsla(0, 0%, 100%, 0.5);
            --tp-label-foreground-color: hsla(0, 0%, 100%, 0.5);

        /*body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }*/
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transform: translateZ(0); /* Force GPU Layer */
        }
        
        /* Containers for the Widgets */
        .widget-pane {
            /*position: fixed;*/
            position: absolute;
            z-index: 10;
            width: 260px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            /* Avoid that events affect the canvas if not necessary */
            pointer-events: auto; 

            transform: translateZ(0); /* Crea un nuevo stacking context en GPU */
            backface-visibility: hidden;
            perspective: 1000;
            will-change: transform, opacity;
        }

        #ui-camera { top: 10px; right: 300px; }
        #ui-geometry { top: 10px; right: 20px; }
        #ui-performance { bottom: 20px; left: 10px; width: 200px; }

    <link rel="icon" href="/DogEngine/ico/Triangle_icon.png" type="image/png">

    <script>
        // Global state for the performance monitor
        var performanceState = {
            fps: 0.0
        };
        // Global state for the configuration parameters
        var configState = {
            background: { r: 0.4, g: 0.6, b: 0.9, a: 1.0 }
        };
    </script>

    <script type="module">
        import { Pane } from '/DogEngine/lib/tweakpane-4.0.5.js';
        //import { mat4 } from 'gl-matrix';

        // --- Widget 1: Performance  ---
        const panePerformance = new Pane({ container: document.getElementById('ui-performance'), title: '📊 Performance' });
        panePerformance.addBinding(performanceState, 'fps', { label: 'FPS', readonly: true, view: 'number' }).on('change', emitUI);
        panePerformance.addBinding(performanceState, 'fps', { 
            label: 'FPS Graph', readonly: true, view: 'graph', 
            interval: 100, bufferSize: 64, min: 10, max: 200 
        }).on('change', emitUI);

        // --- Widget 2: Config  ---
        const paneConfig = new Pane({ container: document.getElementById('ui-config'), title: '⚙️ Config' });
        paneConfig.addBinding(configState, 'background', { color: {type: 'float'} }).on('change', emitUI);

        // Send data to the engine
        function emitUI() {
            window.dispatchEvent(new CustomEvent(EVT_UI, { detail: performanceState }));
            window.dispatchEvent(new CustomEvent(EVT_UI, { detail: configState }));
        }

        // Refresh UI at a lower rate (e.g., 10Hz or 15Hz is enough for the human eye)
        setInterval(() => {
            panePerformance.refresh();
        }, 100);

        // Emit initial state
        emitUI();
    </script>

    <script type="text/javascript" src="/DogEngine/WebGPU-Engine.js"></script>
    <script type="text/javascript" src="/DogEngine/lib/gl-matrix-min.js"></script>

    <script type="text/javascript" src="/DogEngine/DogCamera.js"></script>
    <script type="text/javascript" src="/DogEngine/DogShape.js"></script>
    <script type="text/javascript" src="/DogEngine/DogStaticMesh.js"></script>
    <script type="text/javascript" src="/DogEngine/light/DogDirectionalLight.js"></script>
    <script type="text/javascript" src="/DogEngine/pipeline/DogPipeline.js"></script>
    <script type="text/javascript" src="/DogEngine/pipeline/PhongShadingPipeline.js"></script>
    <script type="text/javascript" src="/DogEngine/pipeline/WireframePipeline.js"></script>
</head>
<body onload="init();">
    <canvas width="800" height="600" id="WebGPUcanvas"></canvas>

    <!-- Containers for Tweakpane -->
    <div id="ui-performance" class="widget-pane"></div>
    <div id="ui-config" class="widget-pane"></div>

    <script type="text/javascript">
        var canvas;
        var pGraphics;

        let lastTime = 0;

        /******* Events' names for clean communication *******/
        const EVT_DATA = 'engine-data-update';
        const EVT_UI = 'ui-params-change';
        //***************************************************
        
        var phongShadingPipeline;
        var wireframePipeline;

        var camera;

        var resourceManager;

        var sphere;
    
        var directionalLight = null;

        var scalingFactor = 0.01;

        var bindGroupLayouts;

        var depthTexture;

        var propsBindGroup;
        var propsBindGroupLayout;

        //------------------- Demo's main functions -------------------
        function createShapes(){
            const shape = new DogShape();
            
            var descriptor = {};
            descriptor.radio = 30.0;
            descriptor.slices = 25;
            descriptor.stacks = 25;
            descriptor.BoundingVolumeType = BoundingVolumeType.Sphere;

            sphere = shape.createSphere(descriptor);

            descriptor = {};
            descriptor.delta = [100.0, 0.0, 100.0];
            descriptor.numVertRows = 50;
            descriptor.numVertCols = 50;
            descriptor.position = [0.0, 0.0, 0.0];
            descriptor.texScale = 1.0;
            
            grid = shape.createGrid(descriptor);
            
            sphere.getTransform().translateAbsolute(0.0, 30.0, 0.0);
        }

        function createPipeline(){
            const bglPhong = [];
            bglPhong.push(bindGroupLayouts.get("DogCamera").bindGroupLayout);
            bglPhong.push(bindGroupLayouts.get("DogTransform").bindGroupLayout);
            bglPhong.push(bindGroupLayouts.get("DogDirectionalLight").bindGroupLayout);

            phongShadingPipeline = new PhongShadingPipeline(bglPhong);

            const bglWireframe = [];
            bglWireframe.push(bindGroupLayouts.get("DogCamera").bindGroupLayout);
            bglWireframe.push(bindGroupLayouts.get("DogTransform").bindGroupLayout);

            bglWireframe.push(propsBindGroupLayout);
            wireframePipeline = new WireframePipeline(bglWireframe);

            depthTexture = pGraphics.device.createTexture({
                size: [canvas.width, canvas.height],
                format: 'depth24plus',
                usage: GPUTextureUsage.RENDER_ATTACHMENT,
            });
        }

        function createProps(){
            propsBindGroupLayout = pGraphics.device.createBindGroupLayout({
                entries: [{
                    binding: 0,                           // Same index as in the bindGroup
                    visibility: GPUShaderStage.FRAGMENT,    // In which stages is visible
                    buffer: {
                        type: "uniform"                     // uniform buffer (default)
                    }
                }]
            });

            var propsData = new Float32Array([1.0, 1.0, 0.0, 1.0]); // Color amarillo
            var propsBuffer = pGraphics.device.createBuffer({
                size: propsData.byteLength,
                usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
            });
            pGraphics.device.queue.writeBuffer(propsBuffer, 0, propsData.buffer);
            
            propsBindGroup = pGraphics.device.createBindGroup({
                layout: propsBindGroupLayout,
                entries: [
                    {
                        binding: 0,
                        resource: {
                            buffer: propsBuffer,
                        },
                    },
                ],
            });
        }

        function createLightsMaterials() {
            directionalLight = new DogDirectionalLight();
            directionalLight.setColor([1.0, 0.0, 0.0, 1.0]);
        }

        //------------------ End demo's main functons -----------------

        /**
         * Initializes WebGPU, sets up event listeners for input, and starts the render loop.
         */
        async function init(){
            canvas = document.getElementById("WebGPUcanvas");

            pGraphics = await webGPUengine.initWebGPU(canvas);

            window.onkeydown = event => this.onKeyDown(event);
            window.onkeyup = event => this.onKeyUp(event);
            canvas.onmouseup = event => this.onMouseUp(event);
            canvas.onmousedown = event => this.onMouseDown(event);
            canvas.onmousemove = event => this.onMouseMove(event);

            const groupLayouts = [
                { name: "DogCamera", label:"Camera", group: 0, binding: 0, bufferSize: 16 * 4 * 2, visibility: GPUVisibility.Vertex },
                { name: "DogTransform", label: "Transform", group: 1, binding: 0, bufferSize: 16 * 4, visibility: GPUVisibility.Vertex },
                { name: "DogDirectionalLight", label: "Directional Light", group: 2, binding: 0, bufferSize: 16 * 4, visibility: GPUVisibility.Fragment },
                //{ name: "DogMaterial", label: "Material", group: 2, binding: 1, bufferSize: 16 * 4, visibility: GPUVisibility.Fragment }
            ];

            bindGroupLayouts = webGPUengine.createBindGroupLayouts(groupLayouts);

            resourceManager = new DogResourceManager();

            camera = new DogCamera();
            camera.setPosition([0.0, 0.0, 100.0]);
            camera.setSpeed(2.3);
            camera.setFarPlane(4000.0);
            
            createShapes();
            createProps();
            createPipeline();
            createLightsMaterials();

            requestAnimationFrame(updateAndRender);
        }

        //------------- Input -------------
        /**
         * Release click and stop dragging.
         * @param {MouseEvent} event 
         */
        function onMouseUp(event) {
            this.dragging = false;
            mouse.down = false;
        }

        /**
         * Click and start dragging.
         * @param {MouseEvent} event 
         */
        function onMouseDown(event) {
            this.dragging = true;
            var x = event.clientX; // x coordinate of a mouse pointer
            var y = event.clientY; // y coordinate of a mouse pointer
            var rect = event.target.getBoundingClientRect();

            //console.log("Mouse down at: " + x + ", " + y);
            mouse.down = true;
            mouse.x = x;
            mouse.y = y;

            //x = ((x - rect.left) - canvas.width / 2) / (canvas.width / 2);
            //y = (canvas.height / 2 - (y - rect.top)) / (canvas.height / 2);
            console.log("Mouse down at: " + x + ", " + y);
        }

        /**
         * If dragging, calculates the difference in mouse position and rotates the camera.
         * @param {MouseEvent} event 
         */
        function onMouseMove(event) {
            this.lastX = this.x;
            this.lastY = this.y;

            this.x = event.clientX;
            this.y = event.clientY;

            mouse.x = this.x;
            mouse.y = this.y;

            if (!this.dragging) 
                return;

            const dx = this.x - this.lastX;
            const dy = this.y - this.lastY;

            camera.yaw(dx * camera.getSpeedRotation());
            camera.pitch(dy * camera.getSpeedRotation());
        }

        /**
         * Handles input events.
         */
        function input(){
            if(keypress[KeyCode.W])
                camera.moveForward(1);
            if(keypress[KeyCode.S])
                camera.moveForward(-1);
            if(keypress[KeyCode.A])
                camera.strafe(-1);
            if(keypress[KeyCode.D])
                camera.strafe(1);
            if(keypress[KeyCode.Left])
                camera.yaw(0.01);
            if(keypress[KeyCode.Right])
                camera.yaw(-0.01);
            if(keypress[KeyCode.Up])
                camera.pitch(0.01);
            if(keypress[KeyCode.Down])
                camera.pitch(-0.01);
        }

        //------------- End Input -------------
        /**
         * Updates the performance state and handles input.
         * @param {float} time - The current time in milliseconds.
         */
        function update(time){
            const dt = (time - lastTime);
            lastTime = time;
            
            performanceState.fps = 1000 / dt;

            input();

            sphere.update(dt);
            grid.update(dt);
        }

        /**
         * Renders a frame by encoding commands to clear the screen and submit them to the GPU.
         */
        function render(){
            // Rendering logic goes here (e.g., issuing draw calls)
            const encoder = pGraphics.device.createCommandEncoder();
            const pass = encoder.beginRenderPass({
            colorAttachments: [{
                    view: pGraphics.context.getCurrentTexture().createView(),
                    loadOp: "clear",
                    clearValue: { r: configState.background.r, g: configState.background.g, b: configState.background.b, a: configState.background.a }, 
                    storeOp: "store",
                }],
                
                depthStencilAttachment: {
                    view: depthTexture.createView(),
                    depthClearValue: 1.0, // 1.0 is the farthest point
                    depthLoadOp: 'clear',
                    depthStoreOp: 'store',
                }
            });

            pGraphics.device.queue.writeBuffer(camera.getBuffer().getWebGPUBuffer(), 0, camera.getViewMatrix());
            pGraphics.device.queue.writeBuffer(camera.getBuffer().getWebGPUBuffer(), 16 * 4, camera.getProjectionMatrix());
            pGraphics.device.queue.writeBuffer(directionalLight.getBuffer().getWebGPUBuffer(), 0, directionalLight.getData());

            //pass.setPipeline(normalColorPipeline.getWebGPUPipeline());
            pass.setBindGroup(camera.getGroup(), camera.getBindGroup());
            pass.setBindGroup(directionalLight.getGroup(), directionalLight.getBindGroup());

            pass.setPipeline(phongShadingPipeline.getWebGPUPipeline());

            sphere.render(pass);

            pass.setPipeline(wireframePipeline.getWebGPUPipeline());
            pass.setBindGroup(2, propsBindGroup); // Bind group para Props
            grid.render(pass);

            pass.end();

            const commandBuffer = encoder.finish();


            // Finish the command buffer and immediately submit it.
            pGraphics.device.queue.submit([commandBuffer]);
            //console.log("Frame rendered");
        }

        /**
         * Combines the update and render functions into a single loop that runs on each animation frame.
         * @param {float} currentTime - The current time in milliseconds.
         */
        function updateAndRender(currentTime){
            update(currentTime);
            render();

            requestAnimationFrame(updateAndRender);
        }
    </script>
</body>
</html>
