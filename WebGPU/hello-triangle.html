<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU - Hello Triangle</title>

    <!--link rel="icon" type="image/x-icon" href="/icon/Triangle_icon.png"-->
    <link rel="icon" href="/DogEngine/ico/Triangle_icon.png" type="image/png">
</head>
<body onload="init();">
    <canvas width="800" height="600" id="WebGPUcanvas"></canvas>

    <script type="text/javascript">
        var canvas;

        async function init(){
            canvas = document.getElementById("WebGPUcanvas");

            if (!navigator.gpu) {
                throw new Error("WebGPU not supported on this browser.");
            }

            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                throw new Error("No appropriate GPUAdapter found.");
            }

            const device = await adapter.requestDevice();
            const context = canvas.getContext("webgpu");
            const canvasFormat = navigator.gpu.getPreferredCanvasFormat();
            context.configure({
                device: device,
                format: canvasFormat,
            });

            const encoder = device.createCommandEncoder();

            const vertices = new Float32Array([
                //   X,    Y,
                 0.0,  0.5, 
                -0.5, -0.5,
                 0.5, -0.5,
            ]);

            const colors = new Float32Array([
                 1.0, 0.0, 0.0, 1.0, // Red
                 0.0, 1.0, 0.0, 1.0, // Green
                 0.0, 0.0, 1.0, 1.0, // Blue
            ]);

            const vertexBuffer = device.createBuffer({
                label: "vertex positions",
                size: vertices.byteLength,
                usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
            });

            const colorBuffer = device.createBuffer({
                label: "vertex colors",
                size: colors.byteLength,
                usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
            });

            device.queue.writeBuffer(vertexBuffer, /*bufferOffset=*/0, vertices);
            device.queue.writeBuffer(colorBuffer, /*bufferOffset=*/0, colors);

            const vertexBufferLayout = {
                arrayStride: 8,
                attributes: [{
                    format: "float32x2",
                    offset: 0,
                    shaderLocation: 0, // Position, see vertex shader
                }],
            };

            const colorBufferLayout = {
                arrayStride: 16,
                attributes: [{
                    format: "float32x4",
                    offset: 0,
                    shaderLocation: 1, // Color, see vertex shader
                }],
            };

            const shaderModule = device.createShaderModule({
                label: 'Color Shader',
                code: `
                    struct VertexOutput {
                        @builtin(position) Position : vec4f,
                        @location(1) color : vec4f,
                    };

                    @vertex
                    fn vertexMain(@location(0) pos: vec2f, @location(1) color: vec4f) -> 
                    VertexOutput {
                        var output: VertexOutput;
                        output.Position = vec4f(pos, 0.0, 1.0);
                        output.color = color;
                        return output;
                    }

                    @fragment
                    fn fragmentMain(@location(1) color: vec4f) -> @location(0) vec4f {
                        return color;
                    }
                `
            });

            const pipeline = device.createRenderPipeline({
                label: "Color Pipeline",
                layout: "auto",
                vertex: {
                    module: shaderModule,
                    entryPoint: "vertexMain",
                    buffers: [vertexBufferLayout, colorBufferLayout]
                },
                fragment: {
                    module: shaderModule,
                    entryPoint: "fragmentMain",
                    targets: [{
                    format: canvasFormat
                    }]
                }
            });

            const pass = encoder.beginRenderPass({
            colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: "clear",
                    clearValue: { r: 0.0, g: 0.0, b: 0.0, a: 1.0 }, // New line
                    storeOp: "store",
                }]
            });

            pass.setPipeline(pipeline);
            pass.setVertexBuffer(0, vertexBuffer);
            pass.setVertexBuffer(1, colorBuffer);
            pass.draw(vertices.length / 2); // 3 vertices
            
            pass.end();

            const commandBuffer = encoder.finish();

            // Finish the command buffer and immediately submit it.
            device.queue.submit([commandBuffer]);
            console.log("Frame rendered");
        }
    </script>
</body>
</html>
